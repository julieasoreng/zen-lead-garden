<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zen Lead Tracker</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:system-ui,-apple-system,sans-serif;background:#f0f7f0;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:20px;}
    .root{width:100%;max-width:480px;display:flex;flex-direction:column;height:700px;border-radius:20px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,0.13);}
    .landscape{flex-shrink:0;position:relative;overflow:hidden;height:260px;transition:height 1s cubic-bezier(.34,1.4,.64,1);}
    .sky{position:absolute;inset:0;background:#c8e8f8;}
    .cloud{position:absolute;animation:drift linear infinite;}
    @keyframes drift{from{transform:translateX(-220px);}to{transform:translateX(110%);}}
    .grass{position:absolute;bottom:0;left:0;right:0;background:#8dc96e;border-radius:55% 55% 0 0/28px 28px 0 0;transition:height 1s ease;}
    .tree{position:absolute;bottom:0;transform-origin:bottom center;animation:sway ease-in-out infinite;}
    @keyframes sway{0%,100%{transform:rotate(-2.5deg);}50%{transform:rotate(2.5deg);}}
    .world-el{position:absolute;opacity:0;transition:opacity 1.2s ease;}
    .world-el.visible{opacity:1;}
    .goal-bar-wrap{position:absolute;bottom:92px;left:50%;transform:translateX(-50%);width:180px;z-index:10;text-align:center;}
    .goal-lbl{font-size:10px;color:#2d5a3d;font-weight:500;letter-spacing:.05em;margin-bottom:3px;}
    .goal-track{height:8px;background:rgba(255,255,255,.45);border-radius:20px;overflow:hidden;border:1px solid rgba(100,180,100,.35);}
    .goal-fill{height:100%;background:#5cb85c;border-radius:20px;transition:width 1s cubic-bezier(.34,1.4,.64,1);}
    .goal-kr{font-size:11px;color:#2d5a3d;font-weight:500;margin-top:3px;}
    .week-stars{position:absolute;top:12px;right:14px;display:flex;gap:3px;z-index:10;}
    .panel{flex:1;overflow-y:auto;background:#f7faf4;border-top:2px solid #b8dfa0;padding:14px;}
    .panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
    .panel-title{font-size:12px;font-weight:500;color:#4a7c59;letter-spacing:.07em;text-transform:uppercase;}
    .week-hint{font-size:11px;color:#7aaa80;}
    .search-row{display:flex;gap:6px;margin-bottom:10px;}
    .search-input{flex:1;font-size:13px;padding:8px 12px;border-radius:10px;border:1.5px solid #c4e0b4;background:white;color:#2d5a3d;outline:none;}
    .search-input:focus{border-color:#7ec46e;}
    .search-btn{padding:8px 14px;border-radius:10px;background:#7ec46e;color:white;border:none;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;}
    .search-btn:hover{background:#5ca84e;}
    .search-btn:disabled{background:#b8dfa0;cursor:not-allowed;}
    .search-status{font-size:11px;color:#7aaa80;margin-bottom:8px;min-height:16px;}
    .tabs{display:flex;gap:6px;margin-bottom:12px;}
    .tab{font-size:11px;padding:4px 12px;border-radius:20px;border:1px solid #c4e0b4;background:white;color:#557a62;cursor:pointer;font-weight:500;}
    .tab.active{background:#7ec46e;color:white;border-color:#7ec46e;}
    .lead-card{background:white;border-radius:14px;border:1.5px solid #d4eecc;padding:12px 14px;margin-bottom:10px;}
    .lead-card.contacted{opacity:.45;}
    .lead-card.new-result{border-color:#a8d8f8;background:#f0f8ff;}
    .lead-top{display:flex;align-items:flex-start;gap:10px;}
    .cb{width:22px;height:22px;border-radius:50%;border:2px solid #7ec46e;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
    .lead-card.contacted .cb{background:#7ec46e;}
    .cbx{display:none;}
    .lead-card.contacted .cbx{display:block;}
    .lead-body{flex:1;min-width:0;}
    .lead-name{font-size:14px;font-weight:500;color:#2d5a3d;}
    .lead-type{font-size:11px;color:#7aaa80;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px;}
    .lead-contact{font-size:12px;color:#557a62;line-height:1.5;margin-top:2px;}
    .lead-link{font-size:12px;color:#4a90c4;text-decoration:none;}
    .lead-link:hover{text-decoration:underline;}
    .no-site{font-size:11px;color:#c0856a;font-weight:500;}
    .score-pill{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px;}
    .score-circle{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;border:2.5px solid;}
    .score-lbl{font-size:10px;color:#888;}
    .priority-tag{font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;margin-top:4px;}
    .add-to-leads-btn{font-size:11px;color:#185FA5;background:#e6f1fb;border:1px solid #b5d4f4;border-radius:8px;padding:4px 10px;cursor:pointer;margin-top:6px;display:inline-block;}
    .add-to-leads-btn:hover{background:#b5d4f4;}
    .added-tag{font-size:11px;color:#2d6e2d;font-weight:500;margin-top:6px;display:inline-block;}
    .expand-btn{font-size:11px;color:#7ec46e;cursor:pointer;margin-top:8px;background:none;border:none;padding:0;}
    .analysis-block{margin-top:10px;border-top:1px solid #d4eecc;padding-top:10px;}
    .score-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
    .score-row{background:#f7faf4;border-radius:10px;padding:7px 10px;}
    .score-row-lbl{font-size:10px;color:#7aaa80;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px;}
    .score-row-val{font-size:13px;font-weight:500;color:#2d5a3d;}
    .dot-row{display:flex;gap:3px;margin-top:3px;}
    .dot{width:8px;height:8px;border-radius:50%;background:#e0e0e0;}
    .dot.on{background:#7ec46e;}
    .analysis-text{font-size:12px;color:#4a7c59;line-height:1.6;}
.tooltip-wrap{position:relative;display:inline-block;margin-left:4px;cursor:pointer;}
.tooltip-icon{width:13px;height:13px;border-radius:50%;background:#c4e0b4;color:#2d5a3d;font-size:9px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;vertical-align:middle;}
.tooltip-box{display:none;position:absolute;left:18px;top:-4px;background:#2d5a3d;color:white;font-size:11px;padding:6px 10px;border-radius:8px;width:180px;line-height:1.5;z-index:100;}
.tooltip-wrap:hover .tooltip-box{display:block;}
    .deal-section{margin-top:8px;}
    .deal-logged-tag{font-size:12px;color:#2d6e2d;font-weight:500;background:#eaf5e4;padding:5px 10px;border-radius:8px;display:inline-block;}
    .deal-input-row{display:flex;gap:6px;margin-top:6px;align-items:center;}
    .deal-input{font-size:13px;padding:6px 10px;border-radius:8px;border:1.5px solid #c4e0b4;background:white;color:#2d5a3d;outline:none;width:130px;}
    .deal-input:focus{border-color:#7ec46e;}
    .deal-confirm-btn{padding:6px 14px;border-radius:8px;background:#7ec46e;color:white;border:none;font-size:12px;font-weight:500;cursor:pointer;}
    .deal-open-btn{font-size:12px;color:#2d6e2d;background:#eaf5e4;border:1.5px solid #b8dfa0;border-radius:8px;padding:5px 12px;cursor:pointer;margin-top:6px;display:inline-block;}
    .deal-open-btn:hover{background:#d4f0d4;}
.delete-btn{font-size:11px;color:#a03a3a;background:none;border:none;cursor:pointer;padding:0;margin-top:6px;display:inline-block;opacity:0.6;}
.delete-btn:hover{opacity:1;text-decoration:underline;}
    .add-row{display:flex;gap:8px;margin-top:4px;}
    .add-input{flex:1;font-size:13px;padding:8px 12px;border-radius:10px;border:1.5px solid #c4e0b4;background:white;color:#2d5a3d;outline:none;}
    .add-input:focus{border-color:#7ec46e;}
    .add-btn{padding:8px 18px;border-radius:10px;background:#7ec46e;color:white;border:none;font-size:15px;cursor:pointer;}
    .section-divider{font-size:11px;color:#7aaa80;font-weight:500;text-transform:uppercase;letter-spacing:.06em;margin:14px 0 8px;}
    .toast{position:absolute;bottom:70px;left:50%;transform:translateX(-50%) translateY(50px);background:white;border:1.5px solid #b8dfa0;border-radius:14px;padding:10px 18px;font-size:12px;color:#2d5a3d;font-weight:500;opacity:0;transition:transform .4s cubic-bezier(.34,1.56,.64,1),opacity .4s;white-space:nowrap;z-index:50;pointer-events:none;}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
    .beach-overlay{position:absolute;inset:0;opacity:0;pointer-events:none;transition:opacity 2s ease;z-index:20;overflow:hidden;}
    .beach-overlay.visible{opacity:1;pointer-events:auto;}
    @keyframes flutter{0%,100%{transform:translateY(0) rotate(-4deg);}50%{transform:translateY(-10px) rotate(4deg);}}
    @keyframes balloonFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
    @keyframes sunbob{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(-5px);}}
  </style>
</head>

    <div class="tabs">
      <button class="tab active" onclick="setTab('alle',this)">alle</button>
      <button class="tab" onclick="setTab('aktive',this)">aktive</button>
      <button class="tab" onclick="setTab('deals',this)">deals logget</button>
      <button class="tab" onclick="setTab('resultater',this)">søkeresultater</button>
    </div>

    <div id="lead-list"></div>
    <div class="add-row">
      <input class="add-input" id="new-lead" placeholder="Legg til bedrift manuelt..."/>
      <button class="add-btn" onclick="addLead()">+</button>
    </div>
  </div>
</div>

<script>
const GOAL_KR=18000;
const CRITERIA=[
  {key:'betalingsevne',label:'Betalingsevne',tip:'Har de råd til å betale 10–25k? Se på priser, bilder og antall kunder.'},
  {key:'pain',label:'Problemnivå',tip:'Booking via DM, ingen nettside = kaos = lett salg. Jo mer kaos, jo bedre.'},
  {key:'verdi',label:'Verdiøkning',tip:'Kan du faktisk hjelpe dem tjene mer? Flere bookinger, mindre stress?'},
  {key:'kontakt',label:'Kontaktbarhet',tip:'Aktiv på Instagram, DM åpen, svarer raskt på kommentarer?'},
  {key:'beslutning',label:'Beslutningstakt',tip:'Solo-eier sier ja samme dag. Stor bedrift = treg prosess.'},
  {key:'fit',label:'Fit med deg',tip:'Får du energi av å jobbe med dem? Undervurdert – energi = konsistens.'}
];
const MAX=30;
let currentTab='alle';
let searchResults=[];

const leads=[
  {name:"Frisør Fryd",type:"frisør",contact:"+47 900 12 345 · fryd@gmail.com",website:null,address:"Oslo",
   scores:{betalingsevne:4,pain:5,verdi:5,kontakt:5,beslutning:5,fit:4},
   analysis:"Ingen nettside, aktiv på Instagram med 2 300 følgere. Eier svarer raskt på DM. Estimert verdi: 8–15k kr.",
   contacted:false,dealKr:0,dealOpen:false,open:false,isResult:false},
  {name:"Barbershop Kings",type:"barbershop",contact:"+47 412 67 890",website:"http://barbershopkings.no",address:"Oslo",
   scores:{betalingsevne:4,pain:4,verdi:4,kontakt:3,beslutning:4,fit:3},
   analysis:"Nettside fra 2013, ikke mobiloptimalisert. Estimert verdi: 6–10k kr.",
   contacted:false,dealKr:0,dealOpen:false,open:false,isResult:false},
  {name:"Nagelstudio Lykke",type:"neglesalong",contact:"lykke.negler@outlook.com",website:null,address:"Oslo",
   scores:{betalingsevne:3,pain:5,verdi:4,kontakt:4,beslutning:5,fit:5},
   analysis:"Aktiv på Facebook, ingen nettside. Estimert verdi: 7–12k kr.",
   contacted:false,dealKr:0,dealOpen:false,open:false,isResult:false},
  {name:"Restaurant Solberg",type:"restaurant",contact:"+47 223 45 678",website:"http://solbergmat.no",address:"Oslo",
   scores:{betalingsevne:4,pain:3,verdi:3,kontakt:2,beslutning:3,fit:2},
   analysis:"Utdatert nettside. Estimert verdi: 8–14k kr.",
   contacted:false,dealKr:0,dealOpen:false,open:false,isResult:false}
];

function guessScores(place){
  const website=place.websiteUri||null;
  const hasNoSite=!website;
  const isInstagram=website&&(website.includes('instagram.com')||website.includes('facebook.com'));
  const rating=place.rating||3;
  const reviews=place.userRatingCount||0;
  const name=(place.displayName&&place.displayName.text||'').toLowerCase();

  const pain=hasNoSite?5:isInstagram?4:2;
  const verdi=hasNoSite?5:isInstagram?4:2;
  const betalingsevne=rating>=4.8&&reviews>200?5:rating>=4.5&&reviews>100?4:rating>=4?3:2;
  const kontakt=reviews>200?4:reviews>50?3:reviews>10?2:1;
  const beslutning=reviews<50?5:reviews<200?4:3;
  const frisørTypes=['frisør','hair','barber','negl','nail','beauty','salong','lash','brow','spa'];
  const fit=frisørTypes.some(t=>name.includes(t))?4:3;

  return {betalingsevne,pain,verdi,kontakt,beslutning,fit};
}

async function searchPlaces(){
  const query=document.getElementById('search-input').value.trim();
  if(!query)return;
  const btn=document.getElementById('search-btn');
  const status=document.getElementById('search-status');
  btn.disabled=true;btn.textContent='søker...';
  status.textContent='Henter bedrifter fra Google...';
  try{
    const res=await fetch(`/api/places?query=${encodeURIComponent(query)}`);
    const data=await res.json();
    if(data.places&&data.places.length>0){
      searchResults=data.places.map(place=>({
        name:place.displayName.text,
        type:query.split(' ')[0],
        contact:'',
        website:place.websiteUri||null,
        address:place.formatted_address||'',
        scores:{betalingsevne:0,pain:0,verdi:0,kontakt:0,beslutning:0,fit:0},
        analysis:`Google-rating: ${place.rating||'ukjent'}/5 (${place.userRatingCount||0} anmeldelser). ${place.websiteUri?'Har nettside – vurder redesign.':'Ingen nettside funnet – perfekt kandidat.'}`,
        contacted:false,dealKr:0,dealOpen:false,open:false,isResult:true,added:false,
        placeId:place.place_id
      }));
      searchResults.forEach(r=>{
        const w=r.website;
        const hasNoSite=!w;
        const isInstagram=w&&(w.includes('instagram.com')||w.includes('facebook.com'));
        const rating=r.rating||3;
        const reviews=r.userRatingCount||0;
        const name=(r.name||'').toLowerCase();
        const frisørTypes=['frisør','hair','barber','negl','nail','beauty','salong','lash','brow','spa'];
        r.scores={
          betalingsevne:rating>=4.8&&reviews>200?5:rating>=4.5&&reviews>100?4:rating>=4?3:2,
          pain:hasNoSite?5:isInstagram?4:2,
          verdi:hasNoSite?5:isInstagram?4:2,
          kontakt:reviews>200?4:reviews>50?3:reviews>10?2:1,
          beslutning:reviews<50?5:reviews<200?4:3,
          fit:frisørTypes.some(t=>name.includes(t))?4:3
        };
      });
      status.textContent=`${searchResults.length} bedrifter funnet`;
      setTab('resultater',document.querySelector('.tab:last-child'));
    } else {
      status.textContent='Ingen resultater. Prøv et annet søk.';
    }
  } catch(e){
    status.textContent='Noe gikk galt – sjekk at Netlify er deployet.';
  }
  btn.disabled=false;btn.textContent='søk';
}

document.getElementById('search-input').addEventListener('keydown',e=>{
  if(e.key==='Enter')searchPlaces();
});

function addResultToLeads(idx){
  const r={...searchResults[idx],isResult:false,added:false};
  leads.push(r);
  searchResults[idx].added=true;
  render();
  showToast(r.name+' lagt til i leads!');
}

function totalScore(l){return Object.values(l.scores).reduce((a,b)=>a+b,0);}
function totalKr(){return leads.reduce((s,l)=>s+l.dealKr,0);}
function totalContacted(){return leads.filter(l=>l.contacted).length;}
function totalDeals(){return leads.filter(l=>l.dealKr>0).length;}

function priorityInfo(t){
  if(t>=24)return{label:'prioriter hardt',bg:'#d4f0d4',color:'#2d6e2d'};
  if(t>=18)return{label:'bra lead',bg:'#fdf0c0',color:'#7a6000'};
  return{label:'lav prioritet',bg:'#f0e0e0',color:'#8a3a3a'};
}
function circleStyle(t){
  if(t>=24)return{border:'#5cb85c',color:'#2d6e2d',bg:'#eafaea'};
  if(t>=18)return{border:'#e0b040',color:'#7a6000',bg:'#fdf8e0'};
  return{border:'#d07070',color:'#8a3a3a',bg:'#fdf0f0'};
}
function dots(val){
  let h='<div class="dot-row">';
  for(let i=1;i<=5;i++)h+=`<div class="dot${i<=val?' on':''}"></div>`;
  return h+'</div>';
}

let toastTimer=null;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),3500);
}

const worldMs=[
  {contacts:1,msg:"Første kontakt sendt – verden merker det."},
  {contacts:3,msg:"3 kontakter ute. Regnbuen dukker opp."},
  {contacts:5,msg:"5 kontakter! Blomstene kommer frem."},
  {contacts:7,msg:"7 kontakter – sommerfuglen er fri."},
  {contacts:10,msg:"10 kontakter. Hytta dukker opp i horisonten."},
];
const dealMs=[
  {deals:1,msg:"DEAL LANDET! Ballongen stiger. Du er entrepreneur."},
  {deals:2,msg:"2 deals! Du har et system som funker."},
  {deals:3,msg:"3 deals – du er halvveis til Thailand."},
];
let prevC=0,prevD=0;

function updateWorld(){
  const contacted=totalContacted(),deals=totalDeals(),kr=totalKr();
  const pct=Math.min((kr/GOAL_KR)*100,100);
  document.getElementById('goal-fill').style.width=pct+'%';
  document.getElementById('goal-kr').textContent=kr.toLocaleString('nb-NO')+' / '+GOAL_KR.toLocaleString('nb-NO')+' kr tjent';
  if(pct>=100){document.getElementById('beach').classList.add('visible');document.getElementById('goal-lbl').textContent='mål nådd – velkommen til Thailand!';}
  document.getElementById('landscape').style.height=Math.min(240+contacted*12+deals*25,430)+'px';
  document.getElementById('grass').style.height=Math.min(80+contacted*3+deals*8,130)+'px';
  const show=id=>{const e=document.getElementById(id);if(e)e.classList.add('visible');};
  if(contacted>=1)show('el-birds');if(contacted>=3)show('el-rainbow');
  if(contacted>=5)show('el-flowers');if(contacted>=7)show('el-butterfly');
  if(contacted>=10)show('el-cottage');if(deals>=1)show('el-balloon');
  if(contacted>prevC){const m=worldMs.find(x=>x.contacts===contacted);if(m)showToast(m.msg);}
  if(deals>prevD){const m=dealMs.find(x=>x.deals===deals);if(m)showToast(m.msg);}
  prevC=contacted;prevD=deals;
  let stars=0;
  if(contacted>=1)stars=1;if(contacted>=3)stars=2;if(contacted>=5)stars=3;
  if(deals>=1)stars=Math.max(stars,4);if(deals>=2)stars=5;
  const wrap=document.getElementById('week-stars');wrap.innerHTML='';
  for(let i=1;i<=5;i++){
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('width','16');svg.setAttribute('height','16');svg.setAttribute('viewBox','0 0 14 14');
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d','M7 1l1.5 3.2 3.5.5-2.5 2.4.6 3.5L7 9l-3.1 1.6.6-3.5L2 4.7l3.5-.5z');
    path.setAttribute('fill',i<=stars?'#f9d030':'rgba(255,255,255,0.35)');
    svg.appendChild(path);wrap.appendChild(svg);
  }
  const targets=[3,5,8,12,20];
  const next=targets.find(t=>t>contacted)||20;
  document.getElementById('week-hint').textContent='mål: '+next+' kontakter totalt';
}

function setTab(tab,btn){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');render();
}

function confirmDeal(i){
  const input=document.getElementById('deal-input-'+i);
  const num=Math.round(parseFloat(input.value));
  if(!isNaN(num)&&num>0){leads[i].dealKr=num;leads[i].contacted=true;leads[i].dealOpen=false;render();}
  else{input.style.borderColor='#d07070';setTimeout(()=>input.style.borderColor='',1200);}
}
function openDealInput(i){leads[i].dealOpen=true;render();setTimeout(()=>{const inp=document.getElementById('deal-input-'+i);if(inp)inp.focus();},50);}

function renderCard(lead,i,isResult,resultIdx){
  const t=totalScore(lead),p=priorityInfo(t),c=circleStyle(t);
  const card=document.createElement('div');
  card.className='lead-card'+(lead.contacted?' contacted':'')+(isResult?' new-result':'');

  const webHTML=lead.website
    ?`<a class="lead-link" href="${lead.website}" target="_blank">${lead.website.replace(/https?:\/\//,'').substring(0,35)}</a>`
    :`<span class="no-site">ingen nettside</span>`;

  const addrHTML=lead.address?`<div style="font-size:11px;color:#999;margin-top:1px;">${lead.address.substring(0,50)}</div>`:'';

  let actionHTML='';
  if(isResult){
    actionHTML=lead.added
      ?`<span class="added-tag">lagt til i leads</span>`
      :`<button class="add-to-leads-btn" onclick="addResultToLeads(${resultIdx})">+ legg til i leads</button>`;
  } else {
    let dealHTML='';
    if(lead.dealKr>0)dealHTML=`<div class="deal-section"><span class="deal-logged-tag">deal landet: ${lead.dealKr.toLocaleString('nb-NO')} kr</span></div>`;
    else if(lead.dealOpen)dealHTML=`<div class="deal-section"><div class="deal-input-row"><input class="deal-input" id="deal-input-${i}" type="number" placeholder="f.eks. 10000" min="1"/><button class="deal-confirm-btn" onclick="confirmDeal(${i})">logg</button></div></div>`;
    else dealHTML=`<div class="deal-section"><button class="deal-open-btn" onclick="openDealInput(${i})">logg deal som landet</button></div>`;
    actionHTML=dealHTML;
  }

  const grid=CRITERIA.map(cr=>`<div class="score-row"><div class="score-row-lbl">${cr.label}<span class="tooltip-wrap"><span class="tooltip-icon">i</span><span class="tooltip-box">${cr.tip}</span></span></div><div class="score-row-val">${lead.scores[cr.key]}/5</div>${dots(lead.scores[cr.key])}</div>`).join('');

  const toggleFn=isResult?`onclick="toggleResultOpen(${resultIdx})"`:`onclick="toggleOpen(${i})"`;
  const openState=lead.open||false;

  card.innerHTML=`
    <div class="lead-top">
      ${!isResult?`<div class="cb" onclick="toggleContacted(${i})"><svg class="cbx" width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><polyline points="1.5,5 4,7.5 8.5,2.5"/></svg></div>`:''}
      <div class="lead-body">
        <div class="lead-type">${lead.type}</div>
        <div class="lead-name">${lead.name}</div>
        ${addrHTML}
        <div style="margin-top:2px;">${webHTML}</div>
        ${lead.contact?`<div class="lead-contact">${lead.contact}</div>`:''}
      </div>
      <div class="score-pill">
        <div class="score-circle" style="border-color:${c.border};color:${c.color};background:${c.bg};">${t}</div>
        <div class="score-lbl">av ${MAX}</div>
        <div class="priority-tag" style="background:${p.bg};color:${p.color};">${p.label}</div>
      </div>
    </div>
    ${actionHTML}
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;">
      <button class="expand-btn" style="margin-top:0;" ${toggleFn}>${openState?'▲ skjul analyse':'▼ vis analyse'}</button>
      ${!isResult?`<button class="delete-btn" style="margin-top:0;" onclick="deleteLead(${i})">fjern lead</button>`:''}
    </div>
    ${openState?`<div class="analysis-block"><div class="score-grid">${grid}</div><div class="analysis-text">${lead.analysis}</div></div>`:''}
  `;
  return card;
}

function render(){
  const list=document.getElementById('lead-list');
  list.innerHTML='';

  if(currentTab==='resultater'){
    if(searchResults.length===0){
      list.innerHTML='<div style="font-size:13px;color:#7aaa80;padding:12px 0;">Søk etter bedrifter ovenfor.</div>';
    } else {
      searchResults.forEach((r,idx)=>list.appendChild(renderCard(r,null,true,idx)));
    }
  } else {
    const sorted=[...leads].sort((a,b)=>totalScore(b)-totalScore(a));
    const filtered=sorted.filter(l=>{
      if(currentTab==='aktive')return !l.contacted&&!l.dealKr;
      if(currentTab==='deals')return l.dealKr>0;
      return true;
    });
    if(filtered.length===0){
      list.innerHTML='<div style="font-size:13px;color:#7aaa80;padding:12px 0;">Ingen leads her ennå.</div>';
    } else {
      filtered.forEach(lead=>{
        const i=leads.indexOf(lead);
        list.appendChild(renderCard(lead,i,false,null));
      });
    }
  }
  updateWorld();
}

function toggleResultOpen(i){searchResults[i].open=!searchResults[i].open;render();}
function deleteLead(i){leads.splice(i,1);render();}
function toggleContacted(i){leads[i].contacted=!leads[i].contacted;render();}
function toggleOpen(i){leads[i].open=!leads[i].open;render();}

function addLead(){
  const input=document.getElementById('new-lead'),name=input.value.trim();
  if(!name)return;
  leads.push({name,type:'bedrift',contact:'',website:null,address:'',
    scores:{betalingsevne:3,pain:3,verdi:3,kontakt:3,beslutning:3,fit:3},
    analysis:'Analyser og legg til notater her.',contacted:false,dealKr:0,dealOpen:false,open:false,isResult:false});
  input.value='';render();
}

render();
</script>
</body>
</html>
